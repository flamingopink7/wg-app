<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
<title>WG App</title>
<link rel="manifest" href="./manifest.json" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
<script>
stlite.mount({
requirements: ["pandas", "plotly", "st-gsheets-connection"],
entrypoint: "app.py",
files: {
".streamlit/secrets.toml": `
[connections.gsheets]
spreadsheet = "https://docs.google.com/spreadsheets/d/1hX1kA8MnpgH5z9w-nhyX7gjFGqmlrT6-7ztM0MPo9uQ/edit?usp=sharing"
`,
"app.py": `
import streamlit as st
import pandas as pd
import hashlib
from datetime import datetime, date, timedelta
import plotly.express as px
from streamlit_gsheets import GSheetsConnection

USER_PASSWORDS = {
    "Livio": "8e8869158309575390632a93b584a2826a793c5d790d0b0473e0a293933f7216",
    "Salwa": "e26521568288f34354c0382375997237887e2f5080072979207869634e3e3c6a",
    "Saphira": "153702174c83093282f641b96434f07a72661858004b3e390212f37c35a63973",
    "Nils": "83234914a8e5621404c0840e6c6978413f4384a86d26715f5a8c268f70529683"
}

def hash_pw(p):
    return hashlib.sha256(str.encode(p)).hexdigest()

conn = st.connection("gsheets", type=GSheetsConnection)
st.set_page_config(page_title="WG", page_icon="🏔️", layout="centered")

st.markdown("""
<style>
    .stButton > button { width: 100%; min-height: 65px; border-radius: 12px; font-weight: bold; }
    .block-container { padding-left: 90px !important; }
    [data-testid="stRadio"] { position: fixed !important; top: 0; left: 0; width: 80px; height: 100vh; background-color: #f0f2f6; z-index: 999999; padding-top: 30px; }
    header, footer, [data-testid="collapsedControl"] { display: none !important; }
</style>
""", unsafe_allow_html=True)

if "auth" not in st.session_state:
    st.session_state.update({"user": None, "auth": False})

if not st.session_state.auth:
    st.title("🏔️ WG Login")
    u = st.text_input("User")
    p = st.text_input("PW", type="password")
    if st.button("Anmelden"):
        if u in USER_PASSWORDS and hash_pw(p) == USER_PASSWORDS[u]:
            st.session_state.update({"user": u, "auth": True})
            st.rerun()
        else:
            st.error("Falsch")
    st.stop()

st.write(f"Hallo {st.session_state.user}!")
st.success("App erfolgreich geladen!")
`
}
}, document.getElementById("root"));
</script>
</body>
</html>
