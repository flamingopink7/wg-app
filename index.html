<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WG App</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./static/icon.png" />
    <link rel="apple-touch-icon" href="./static/icon.png" />
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #f0f2f6; margin: 0; padding: 20px; color: #31333F; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h1 { text-align: center; margin-top: 0; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; min-height: 50px; background-color: #FF4B4B; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #ff3333; }
        .error { color: red; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>🏔️ WG Login</h1>
        <label>User</label>
        <input type="text" id="username" placeholder="Livio">
        
        <label>PW</label>
        <input type="password" id="password" placeholder="Passwort">
        
        <button onclick="login()">Anmelden</button>
        <div class="error" id="error-msg">User oder Passwort falsch!</div>
    </div>

    <div class="container" id="app-screen" style="display: none;">
        <h1 id="welcome-text"></h1>
        <p style="text-align: center;">✅ Mit Supabase verbunden!</p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        // ==========================================
        // 1. HIER DEINE SUPABASE KEYS EINTRAGEN!
        // ==========================================
        const SUPABASE_URL = 'DEINE_PROJECT_URL_HIER_EINTRAGEN';
        const SUPABASE_KEY = 'DEINEN_ANON_KEY_HIER_EINTRAGEN';
        
        // HIER WURDE DER NAME GEÄNDERT:
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. LOGIK FÜRS LOGIN
        // ==========================================
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (!userIn || !passIn) return;

            // Passwort hashen
            const hashedPass = await hashPassword(passIn);

            // In Supabase nach dem User suchen
            const { data, error } = await supabaseClient
                .from('wg_users')
                .select('*')
                .ilike('name', userIn)
                .single();

            // Prüfen ob Passwort stimmt
            if (data && data.password_hash === hashedPass) {
                // Login erfolgreich!
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('welcome-text').innerText = `Hallo ${data.name}! 👋`;
                errorMsg.style.display = 'none';
            } else {
                // Login fehlgeschlagen!
                errorMsg.style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
